services:
  db:
    image: postgres:18-alpine
    container_name: moonite-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
      POSTGRES_DB: moonite
    ports:
      - "5432:5432"
    volumes:
      - moonite_pg_data:/var/lib/postgresql   # ✅ PG18写法
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moonite"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: moonite-api
    restart: unless-stopped
    environment:
      ENV: dev
      DATABASE_URL: postgresql+asyncpg://postgres:test@db:5432/moonite
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  moonite_pg_data: